plugins {
    id 'net.neoforged.moddev' version '2.0.140'
}

neoForge {
    version = neoforge_version

    runs {
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', 's3'
        }
        data {
            data()
            programArguments.addAll(
                '--mod', 's3',
                '--all',
                '--output', file('src/generated/resources/').getAbsolutePath(),
                '--existing', file('src/main/resources/').getAbsolutePath(),
                '--existing', rootProject.file('core/src/main/resources/').getAbsolutePath(),
                '--existing', rootProject.file('neoforge/s3/src/main/resources/').getAbsolutePath()
            )
        }
    }

    mods {
        s3 {
            sourceSet sourceSets.main
            sourceSet project(':core').sourceSets.main
            sourceSet project(':neoforge:s3').sourceSets.main
        }
    }
}

sourceSets.main.resources.srcDir 'src/generated/resources'

dependencies {
    implementation project(':core')
    implementation project(':neoforge:s3')

    testRuntimeOnly "org.junit.platform:junit-platform-launcher:1.14.3"
}

tasks.withType(Test).configureEach {
    useJUnitPlatform()
}
