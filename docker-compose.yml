services:
  mc:
    image: itzg/minecraft-server:latest
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: NEOFORGE
      VERSION: "1.21.1"
      MEMORY: "4G"
      REMOVE_OLD_MODS: "TRUE"
      MOTD: "S3 Dev Server"
      OPS: "scuba10steve"
    volumes:
      - mc-data:/data
      - ./server/mods:/mods:ro
    restart: "no"

volumes:
  mc-data:
